<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Quest XR 地球デモ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="hud">
      <section class="panel">
        <div class="titleRow">
          <h1>Quest XR 地球デモ</h1>
          <span class="versionBadge" aria-label="App version">v2026.06.20.07</span>
        </div>
        <p id="status">地球を準備中…</p>
        <div class="actions">
          <button class="actionButton" id="vrButton" type="button">Enter VR</button>
          <button class="actionButton secondary" id="arButton" type="button">Enter AR</button>
        </div>
        <div class="actions demoActions" aria-label="Demo controls">
          <button class="actionButton demo" id="enterpriseOrbitButton" type="button">Enterprise 周回</button>
          <button class="actionButton demo klingon" id="klingonButton" type="button">クリンゴン登場</button>
          <button class="actionButton demo blackHole" id="blackHoleTourButton" type="button">ブラックホール探訪</button>
          <button class="actionButton demo help" id="controllerHelpButton" type="button">操作HELP</button>
        </div>
        <textarea id="poseDebugOutput" class="poseDebugOutput" readonly hidden aria-label="Pose debug URL"></textarea>
      </section>
    </main>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js?v=2026.06.20.07"></script>
  </body>
</html>
