<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyEarth Meta Quest 3 VR Reference Video</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #05070c;
      color: #eef5ff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 12%, rgba(62, 139, 198, 0.28), transparent 32rem),
        radial-gradient(circle at 88% 18%, rgba(237, 174, 94, 0.16), transparent 28rem),
        #05070c;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      padding: 32px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3vw, 2.6rem);
      letter-spacing: 0;
    }

    p {
      margin: 0 0 20px;
      color: #b9c8da;
      line-height: 1.7;
    }

    .player {
      overflow: hidden;
      border: 1px solid rgba(148, 203, 255, 0.42);
      border-radius: 8px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.55);
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    a {
      color: #9ed3ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>MyEarth Meta Quest 3 VR Reference Video</h1>
    <p>Meta Quest 3 の VR で動かしたときの参考動画です。画面内の再生ボタンを押すと、このページ上で再生できます。</p>
    <div class="player">
      <video
        controls
        preload="metadata"
        playsinline
        poster="assets/myearth-video-poster.jpg"
        src="https://github.com/matzoka/quest-xr-glass-demo/releases/download/my-earth-vr-reference-2026-06-19/MyEarth.mp4">
        お使いのブラウザでは動画を再生できません。
      </video>
    </div>
    <p><a href="./">Quest XR 地球デモに戻る</a></p>
  </main>
</body>
</html>
